<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Professor Bhagwan Chowdhry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Theme tokens ─────────────────────────────────────────────── */
    :root {
      --font: 'Inter', sans-serif;
      --radius: 14px;
      --radius-sm: 8px;
      --header-h: 52px;
      --transition: 0.25s ease;
    }

    [data-theme="dark"] {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --border: #363636;
      --text: #f0f0f0;
      --text-dim: #888888;
      --text-mid: #b0b0b0;
      --amber: #e8834a;
      --amber-dim: #c06030;
      --amber-glow: rgba(232, 131, 74, 0.15);
      --blue: #5b9cf6;
      --green: #3ddc84;
      --red: #ff5c6a;
      --input-bg: #262626;
      --input-border: #404040;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
      --shadow-big: 0 12px 48px rgba(0, 0, 0, 0.6);
      --toggle-bg: #3a3a3a;
      --toggle-knob: #f0f0f0;
      --header-bg: rgba(26, 26, 26, 0.92);
      --chip-bg: #2a2a2a;
      --chip-border: #3a3a3a;
      --chip-text: #aaaaaa;
    }

    [data-theme="light"] {
      --bg: #f9f9f9;
      --bg2: #ffffff;
      --bg3: #f0f0f0;
      --border: #e0e0e0;
      --text: #111111;
      --text-dim: #777777;
      --text-mid: #555555;
      --amber: #d97706;
      --amber-dim: #b45309;
      --amber-glow: rgba(217, 119, 6, 0.1);
      --blue: #2563eb;
      --green: #16a34a;
      --red: #ef4444;
      --input-bg: #ffffff;
      --input-border: #d4d4d4;
      --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
      --shadow-big: 0 8px 32px rgba(0, 0, 0, 0.12);
      --toggle-bg: #d4d4d4;
      --toggle-knob: #ffffff;
      --header-bg: rgba(249, 249, 249, 0.92);
      --chip-bg: #f4f4f4;
      --chip-border: #e0e0e0;
      --chip-text: #555555;
    }

    /* ── Base ─────────────────────────────────────────────────────── */
    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.6;
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
      position: relative;
    }

    /* ── Header ───────────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      background: var(--header-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      flex-shrink: 0;
      z-index: 20;
      transition: background var(--transition), border-color var(--transition);
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text);
    }

    .logo span {
      color: var(--amber);
    }

    #theme-toggle-wrap {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .theme-label {
      font-size: 11px;
      color: var(--text-dim);
      user-select: none;
    }

    #theme-toggle {
      position: relative;
      width: 42px;
      height: 24px;
      border-radius: 999px;
      background: var(--toggle-bg);
      border: none;
      cursor: pointer;
      transition: background var(--transition);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }

    #theme-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--toggle-knob);
      transition: transform var(--transition);
    }

    [data-theme="light"] #theme-toggle::after {
      transform: translateX(18px);
    }

    /* ── Download button — fixed top-right, below header ─────────── */
    #download-btn {
      display: none; /* hidden until chat starts */
      position: fixed;
      top: calc(var(--header-h) + 10px);
      right: 16px;
      z-index: 18;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }

    #download-btn:hover {
      color: var(--amber);
      border-color: var(--amber-dim);
      background: var(--amber-glow);
    }

    #download-btn svg { flex-shrink: 0; }

    #download-btn.visible { display: flex; }

    @media (max-width: 600px) {
      #download-btn { right: 12px; }
      #download-btn .dl-label { display: none; }
    }

    /* ── Main ─────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    /* ── Thread ───────────────────────────────────────────────────── */
    #thread {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Hero (empty state) ────────────────────────────────────────── */
    #app.hero-mode #main {
      justify-content: center;
      align-items: center;
    }

    #app.hero-mode #thread {
      display: none;
    }

    #hero-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 16px;
      gap: 0;
      width: 100%;
    }

    #app:not(.hero-mode) #hero-center {
      display: none;
    }

    .hero-avatar {
      width: 112px;
      height: 112px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      margin-bottom: 30px;
      box-shadow: var(--shadow-big);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-greeting {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--text-dim);
      max-width: 480px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .hero-name {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: 0.01em;
    }

    #floating-avatar {
      position: fixed;
      top: calc(var(--header-h) + 14px);
      left: 16px;
      right: auto;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid var(--border);
      object-fit: cover;
      box-shadow: var(--shadow-big);
      z-index: 15;
      opacity: 0;
      display: none;
      pointer-events: none;
      transform-origin: top left;
      will-change: transform, opacity;
      transition: opacity 0.35s ease, transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #floating-avatar.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Chat bubbles ─────────────────────────────────────────────── */
    .turn {
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: fadeUp 0.22s ease;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    .bubble-user {
      align-self: flex-end;
      max-width: 72%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius) var(--radius) 3px var(--radius);
      padding: 10px 16px;
      font-size: 14px;
      color: var(--amber);
      word-break: break-word;
    }

    .bubble-assistant {
      align-self: flex-start;
      max-width: 92%;
      width: 100%;
    }

    .bubble-assistant-inner {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 3px var(--radius) var(--radius) var(--radius);
      padding: 12px 16px;
      transition: background var(--transition);
    }

    .bubble-text {
      font-size: 14px;
      line-height: 1.65;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bubble-text .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--amber);
      animation: blink 0.8s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      color: var(--text-dim);
      font-size: 13px;
      font-style: italic;
    }

    .thinking span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--amber);
      animation: thinking-dot 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes thinking-dot {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40%           { opacity: 1;   transform: scale(1.2); }
    }

    .bubble-text p            { margin-bottom: 0.3em; }
    .bubble-text p:last-child { margin-bottom: 0; }
    .bubble-text ul,
    .bubble-text ol           { padding-left: 20px; margin-bottom: 0.3em; }
    .bubble-text code         { font-size: 12px; background: var(--bg3); padding: 1px 5px; border-radius: 4px; }
    .bubble-text pre          { background: var(--bg3); padding: 10px 12px; border-radius: var(--radius-sm); overflow-x: auto; margin-bottom: 0.3em; }
    .bubble-text pre code     { background: none; padding: 0; }
    .bubble-text h1,
    .bubble-text h2,
    .bubble-text h3           { margin: 0.25em 0 0.05em; font-weight: 600; }
    .bubble-text .katex-display { overflow-x: auto; padding: 4px 0; }
    .latex-error              { color: var(--red); font-size: 0.85em; }

    /* ── Input area ───────────────────────────────────────────────── */
    #input-area {
      flex-shrink: 0;
      padding: 10px 16px 0;
      background: var(--bg);
      transition: background var(--transition);
    }

    #app.hero-mode #input-area { display: none; }

    #hero-input-wrap {
      align-self: stretch;
      width: 100%;
      max-width: 720px;
      margin: 28px auto 0;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    #app:not(.hero-mode) #hero-input-wrap { display: none; }

    #send-row-hero,
    #send-row {
      display: flex;
      width: 100%;
      gap: 8px;
      align-items: center;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius);
      padding: 8px 10px 8px 18px;
      box-shadow: var(--shadow-big);
      transition: border-color 0.2s, background var(--transition), box-shadow 0.2s;
    }

    #send-row-hero:focus-within,
    #send-row:focus-within {
      border-color: var(--amber-dim);
      box-shadow: 0 0 0 3px var(--amber-glow), var(--shadow-big);
    }

    #query-input-hero,
    #query-input {
      flex: 1;
      min-width: 0;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      outline: none;
      -webkit-appearance: none;
      line-height: 1.5;
      padding: 4px 0;
    }

    @media (min-width: 480px) {
      #query-input-hero,
      #query-input { font-size: 14px; }
    }

    #query-input-hero::placeholder,
    #query-input::placeholder { color: var(--text-dim); }

    #chat-input-wrap {
      max-width: 720px;
      margin: 0 auto;
      width: 100%;
    }

    .icon-btn {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-btn:hover { background: var(--bg3); color: var(--text); }

    .btn-send-circle {
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: var(--amber);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-send-circle:hover    { background: var(--amber-dim); }
    .btn-send-circle:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Bio footer ───────────────────────────────────────────────── */
    #bio-footer {
      text-align: center;
      padding: 4px 16px 8px;
      flex-shrink: 0;
      background: var(--bg);
      transition: background var(--transition);
    }

    .bio-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 0.02em;
      transition: color 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .bio-link:hover { color: var(--amber); }
    .bio-link svg   { opacity: 0.6; }

    /* ── Scrollbar ──────────────────────────────────────────────────── */
    ::-webkit-scrollbar       { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Misc ─────────────────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }

    /* ── Toast ────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 24px;
      right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
      pointer-events: none;
    }

    .toast-msg {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      animation: toastIn 0.2s ease;
      display: flex;
      gap: 8px;
      align-items: center;
      box-shadow: var(--shadow);
    }

    @keyframes toastIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Mobile ───────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .hero-greeting  { font-size: 14px; }
      .hero-sub       { font-size: 12px; }
      .hero-name      { font-size: 15px; }
      .hero-avatar    { width: 88px; height: 88px; }
      #thread         { padding: 14px 12px 10px; }
      .bubble-user    { max-width: 88%; }
      .bubble-assistant { max-width: 100%; }
      #floating-avatar { width: 36px; height: 36px; top: calc(var(--header-h) + 8px); left: 12px; }
      #toast          { bottom: 24px; left: 16px; right: 16px; }
      /* Shrink download button label on mobile */
      #download-btn .dl-label { display: none; }
    }
  </style>
</head>

<body>

  <!-- Download button — fixed top-right, below header, shown only after chat starts -->
  <button id="download-btn" onclick="exportConversation()" title="Download conversation as PDF">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
  </button>

  <div id="app" class="hero-mode">

    <!-- ── Header ──────────────────────────────────────────────────── -->
    <header id="header">
      <div class="logo">Prof. Bhagwan Chowdhry</div>

      <div id="theme-toggle-wrap">
        <span class="theme-label" id="theme-label">Dark</span>
        <button id="theme-toggle" aria-label="Toggle dark/light mode" onclick="toggleTheme()"></button>
      </div>
    </header>

    <!-- ── Main area ─────────────────────────────────────────────── -->
    <div id="main">

      <!-- HERO CENTER -->
      <div id="hero-center">
        <img src="Bhagwan.jpeg" id="hero-img" class="hero-avatar" alt="Professor Bhagwan Chowdhry">
        <div class="hero-greeting">Hello, I am not Bhagwan — I am his Avatar!</div>
        <div class="hero-sub">I answer questions just like he does <br>He has tested it extensively</div>
        <div id="hero-input-wrap">
          <div id="send-row-hero">
            <input id="query-input-hero" type="text" placeholder="Ask me anything"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMessage('hero')" />
            <button class="btn-send-circle" id="btn-send-hero" onclick="sendMessage('hero')">
              <span id="btn-spinner-hero" class="spinner hidden"></span>
              <svg id="btn-arrow-hero" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <line x1="12" y1="19" x2="12" y2="5"/>
                <polyline points="5 12 12 5 19 12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- THREAD -->
      <div id="thread"></div>

      <!-- Chat-mode input -->
      <div id="input-area">
        <div id="chat-input-wrap">
          <div id="send-row">
            <input id="query-input" type="text" placeholder="Ask me anything"
              onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMessage('chat')" />
            <button class="btn-send-circle" id="btn-send" onclick="sendMessage('chat')">
              <span id="btn-spinner" class="spinner hidden"></span>
              <svg id="btn-arrow" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <line x1="12" y1="19" x2="12" y2="5"/>
                <polyline points="5 12 12 5 19 12"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <!-- ── Bio footer ─────────────────────────────────────────────── -->
    <div id="bio-footer">
      <a class="bio-link" href="https://sites.google.com/site/bhagwanucla/" target="_blank" rel="noopener">
        website
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
    </div>

  </div>

  <!-- Floating avatar -->
  <img src="Bhagwan.jpeg" id="floating-avatar" alt="Bhagwan's Avatar" title="You are talking to Bhagwan's AI Avatar">

  <div id="toast"></div>

  <script>
    /* ── Config ─────────────────────────────────────────────────────── */
    const API = 'https://bhagwan-avatar-792411508383.asia-south1.run.app';

    /* ── State ──────────────────────────────────────────────────────── */
    let SESSION_ID = crypto.randomUUID();
    let chatStarted = false;

    /* ── Export conversation as PDF ─────────────────────────────────── */
    function exportConversation() {
      // Collect all turns from the DOM
      const turns = document.querySelectorAll('#thread .turn');
      if (!turns.length) { toast('No conversation to export.'); return; }

      const date = new Date().toLocaleString('en-US', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });

      // Build turn HTML for the print window
      let turnsHtml = '';
      turns.forEach(turn => {
        const userBubble = turn.querySelector('.bubble-user');
        const asstBubble = turn.querySelector('.bubble-text');

        if (userBubble) {
          turnsHtml += `
            <div class="turn user-turn">
              <div class="label">You</div>
              <div class="bubble user-bubble">${escapeHtml(userBubble.textContent.trim())}</div>
            </div>`;
        }
        if (asstBubble) {
          // Use innerHTML so markdown/KaTeX rendering is preserved
          const inner = asstBubble.cloneNode(true);
          // Remove the blinking cursor if still there
          inner.querySelectorAll('.cursor').forEach(c => c.remove());
          turnsHtml += `
            <div class="turn asst-turn">
              <div class="label">Prof. Bhagwan Chowdhry</div>
              <div class="bubble asst-bubble">${inner.innerHTML}</div>
            </div>`;
        }
      });

      // Full print-ready HTML document — self-contained, clean, professional
      const printHtml = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Conversation with Prof. Bhagwan Chowdhry</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    font-size: 13px;
    line-height: 1.7;
    color: #111;
    background: #fff;
    padding: 48px 52px;

    margin: 0 auto;
  }

  /* ── Header ── */
  .doc-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    border-bottom: 2px solid #111;
    padding-bottom: 16px;
    margin-bottom: 32px;
  }
  .doc-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: #111;
    line-height: 1.3;
  }
  .doc-sub {
    font-size: 11px;
    color: #666;
    margin-top: 4px;
    font-style: italic;
  }
  .doc-date {
    font-size: 11px;
    color: #888;
    text-align: right;
    white-space: nowrap;
    margin-left: 20px;
    padding-top: 2px;
  }

  /* ── Turns ── */
  .turn {
    margin-bottom: 28px;
    page-break-inside: avoid;
  }
  .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: #888;
  }
  .user-turn .label  { color: #b45309; }
  .asst-turn  .label { color: #1d4ed8; }

  .bubble {
    padding: 12px 16px;
    border-radius: 4px;
    font-size: 13px;
    line-height: 1.7;
    word-break: break-word;
  }
  .user-bubble {
    background: #fef9f0;
    border: 1px solid #fde68a;
    border-left: 3px solid #d97706;
    color: #78350f;
    white-space: pre-wrap;
  }
  .asst-bubble {
    background: #f8faff;
    border: 1px solid #dbeafe;
    border-left: 3px solid #3b82f6;
    color: #1e293b;
  }

  /* ── Markdown inside assistant bubble ── */
  .asst-bubble p            { margin-bottom: 0.5em; }
  .asst-bubble p:last-child { margin-bottom: 0; }
  .asst-bubble ul, .asst-bubble ol { padding-left: 22px; margin-bottom: 0.5em; }
  .asst-bubble li           { margin-bottom: 0.15em; }
  .asst-bubble code         { font-family: 'Courier New', monospace; font-size: 11.5px; background: #e8edf5; padding: 1px 4px; border-radius: 3px; }
  .asst-bubble pre          { background: #1e293b; color: #e2e8f0; padding: 12px; border-radius: 4px; overflow: visible; margin-bottom: 0.5em; font-size: 11px; white-space: pre-wrap; }
  .asst-bubble pre code     { background: none; padding: 0; color: inherit; }
  .asst-bubble h1, .asst-bubble h2, .asst-bubble h3 { margin: 0.6em 0 0.2em; font-weight: 700; }
  .asst-bubble h1           { font-size: 16px; }
  .asst-bubble h2           { font-size: 14px; }
  .asst-bubble h3           { font-size: 13px; }
  .asst-bubble strong       { font-weight: 700; }
  .asst-bubble em           { font-style: italic; }
  .asst-bubble blockquote   { border-left: 3px solid #93c5fd; padding-left: 12px; color: #475569; font-style: italic; margin: 0.4em 0; }
  .asst-bubble a            { color: #2563eb; text-decoration: underline; }

  /* ── Footer ── */
  .doc-footer {
    margin-top: 40px;
    border-top: 1px solid #e0e0e0;
    padding-top: 12px;
    font-size: 10px;
    color: #aaa;
    display: flex;
    justify-content: space-between;
  }

  /* ── Print ── */
  @media print {
    body          { padding: 24px 28px; }
    .turn         { page-break-inside: avoid; }
    .bubble       { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>

  <div class="doc-date">${date}</div>

</html>`;

    function enterChatMode() {
      if (chatStarted) return;
      chatStarted = true;

      // Show the download button
      document.getElementById('download-btn').classList.add('visible');

      const app = document.getElementById('app');
      const heroRow = document.getElementById('send-row-hero');
      const chatRow = document.getElementById('send-row');
      const heroImg = document.getElementById('hero-img');
      const fa = document.getElementById('floating-avatar');

      const heroBox    = heroRow.getBoundingClientRect();
      const heroImgBox = heroImg.getBoundingClientRect();

      app.classList.remove('hero-mode');

      const chatBox = chatRow.getBoundingClientRect();
      fa.style.display = 'block';
      const faBox = fa.getBoundingClientRect();

      const dx = heroBox.left - chatBox.left;
      const dy = heroBox.top  - chatBox.top;
      const sx = heroBox.width  / chatBox.width;
      const sy = heroBox.height / chatBox.height;

      chatRow.style.transition    = 'none';
      chatRow.style.transformOrigin = 'top left';
      chatRow.style.transform     = `translate(${dx}px, ${dy}px) scale(${sx}, ${sy})`;

      const adx = heroImgBox.left - faBox.left;
      const ady = heroImgBox.top  - faBox.top;
      const asx = heroImgBox.width  / faBox.width;
      const asy = heroImgBox.height / faBox.height;

      fa.style.transition    = 'none';
      fa.style.transformOrigin = 'top left';
      fa.style.transform     = `translate(${adx}px, ${ady}px) scale(${asx}, ${asy})`;
      fa.style.opacity       = '0';

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          chatRow.style.transition = 'transform 0.65s cubic-bezier(0.16, 1, 0.3, 1)';
          chatRow.style.transform  = 'none';
          fa.style.transition      = 'transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease';
          fa.style.transform       = 'none';
          fa.style.opacity         = '1';
          fa.classList.add('visible');
        });
      });
    }

    /* ── Theme ──────────────────────────────────────────────────────── */
    function toggleTheme() {
      const html   = document.documentElement;
      const isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('theme-label').textContent = isDark ? 'Light' : 'Dark';
      try { localStorage.setItem('theme', isDark ? 'light' : 'dark'); } catch {}
    }

    (function initTheme() {
      try {
        const saved = localStorage.getItem('theme');
        if (saved) {
          document.documentElement.setAttribute('data-theme', saved);
          document.getElementById('theme-label').textContent = saved === 'dark' ? 'Dark' : 'Light';
        }
      } catch {}
    })();


    /* ── Busy state ─────────────────────────────────────────────────── */
    function setBusy(busy) {
      ['btn-send-hero','btn-send'].forEach(id => {
        const b = document.getElementById(id);
        if (b) b.disabled = busy;
      });
      ['btn-spinner-hero','btn-spinner'].forEach(id => {
        const s = document.getElementById(id);
        if (s) s.classList.toggle('hidden', !busy);
      });
      ['btn-arrow-hero','btn-arrow'].forEach(id => {
        const a = document.getElementById(id);
        if (a) a.classList.toggle('hidden', busy);
      });
      ['query-input-hero','query-input'].forEach(id => {
        const q = document.getElementById(id);
        if (q) q.disabled = busy;
      });
      // Disable download while streaming so export is always complete
      const dlBtn = document.getElementById('download-btn');
      if (dlBtn) dlBtn.disabled = busy;
    }

    /* ── Clear / new chat ───────────────────────────────────────────── */
    async function clearChat() {
      try { await fetch(`${API}/sessions/${SESSION_ID}`, { method: 'DELETE' }); } catch {}
      SESSION_ID  = crypto.randomUUID();
      chatStarted = false;

      const app = document.getElementById('app');
      app.classList.add('hero-mode');

      // Hide download button again
      document.getElementById('download-btn').classList.remove('visible');

      const fa = document.getElementById('floating-avatar');
      fa.classList.remove('visible');
      fa.style.display = 'none';

      document.getElementById('thread').innerHTML = '';
      const hi = document.getElementById('query-input-hero');
      if (hi) hi.value = '';
    }

    /* ── Send message ───────────────────────────────────────────────── */
    async function sendMessage(mode) {
      const inputId = mode === 'hero' ? 'query-input-hero' : 'query-input';
      const inputEl = document.getElementById(inputId);
      const question = inputEl.value.trim();
      if (!question) return;

      inputEl.value = '';
      inputEl.blur();

      enterChatMode();

      setTimeout(() => {
        const ci = document.getElementById('query-input');
        if (ci) ci.focus();
      }, 350);

      setBusy(true);

      const thread = document.getElementById('thread');

      const userTurn = document.createElement('div');
      userTurn.className = 'turn';
      userTurn.innerHTML = `<div class="bubble-user">${escapeHtml(question)}</div>`;
      thread.appendChild(userTurn);

      const asstTurn = document.createElement('div');
      asstTurn.className = 'turn';
      asstTurn.innerHTML = `
        <div class="bubble-assistant">
          <div class="bubble-assistant-inner">
            <div class="bubble-text" id="current-bubble"><span class="thinking">Thinking<span></span><span></span><span></span></span></div>
          </div>
        </div>`;
      thread.appendChild(asstTurn);
      scrollThread();

      const params = new URLSearchParams({
        question,
        session_id: SESSION_ID,
        top_k: '10',
        ...(document.getElementById('cfg-section')?.value && { section_filter: document.getElementById('cfg-section').value }),
      });

      const textEl = document.getElementById('current-bubble');
      let fullText = '';

      try {
        const es = new EventSource(`${API}/query/stream?${params}`);

        es.addEventListener('token', e => {
          fullText += JSON.parse(e.data);
          textEl.innerHTML = renderMd(fullText);
          applyKatex(textEl);
          const cur = document.createElement('span');
          cur.className = 'cursor';
          textEl.appendChild(cur);
          scrollThread();
        });

        es.addEventListener('done', e => {
          textEl.innerHTML = renderMd(fullText);
          applyKatex(textEl);
          textEl.removeAttribute('id');
          setBusy(false);
          es.close();
        });

        es.addEventListener('error', e => {
          textEl.innerHTML = fullText ? renderMd(fullText) : '<em style="color:var(--red)">Error receiving response.</em>';
          applyKatex(textEl);
          textEl.removeAttribute('id');
          setBusy(false);
          es.close();
        });

        es.onerror = () => {
          if (es.readyState === EventSource.CLOSED) return;
          setBusy(false);
          es.close();
        };
      } catch (e) {
        console.error('Query failed:', e);
        setBusy(false);
      }
    }

    function scrollThread() {
      const t = document.getElementById('thread');
      t.scrollTop = t.scrollHeight;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ── Markdown + LaTeX ───────────────────────────────────────────── */
    function renderMd(text) {
      const stash = [];
      function hide(raw, display) {
        const id = '\x02' + stash.length + '\x03';
        stash.push({ id, raw, display });
        return id;
      }
      let s = text.replace(/\$\$([\s\S]+?)\$\$/g,      (_, m) => hide('$$' + m + '$$', true));
      s = s.replace(/\\\[([\s\S]+?)\\\]/g,             (_, m) => hide('\\[' + m + '\\]', true));
      s = s.replace(/\\\(([\s\S]+?)\\\)/g,             (_, m) => hide('\\(' + m + '\\)', false));
      s = s.replace(/\$([^\s$\n][^$\n]*?[^\s$\n]|\S)\$/g, (_, m) => hide('$' + m + '$', false));
      let html = marked.parse(s, { breaks: true, gfm: true });
      for (const { id, raw, display } of stash) {
        const esc = raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        html = html.replace(id, `<span class="latex-pending" data-display="${display}" data-raw="${esc}"></span>`);
      }
      return html;
    }

    function applyKatex(el) {
      el.querySelectorAll('span.latex-pending').forEach(span => {
        const display = span.dataset.display === 'true';
        const raw = span.dataset.raw
          .replace(/&amp;/g,'&').replace(/&lt;/g,'<')
          .replace(/&gt;/g,'>').replace(/&quot;/g,'"');
        const inner = raw
          .replace(/^\$\$([\s\S]*)\$\$$/, '$1')
          .replace(/^\\\[([\s\S]*)\\\]$/, '$1')
          .replace(/^\\\(([\s\S]*)\\\)$/, '$1')
          .replace(/^\$([\s\S]*)\$$/, '$1');
        try {
          span.outerHTML = katex.renderToString(inner, { displayMode: display, throwOnError: false, trust: false });
        } catch (e) {
          span.textContent = raw;
          span.className = 'latex-error';
        }
      });
    }

    function toast(msg) {
      const el = document.createElement('div');
      el.className = 'toast-msg';
      el.textContent = msg;
      document.getElementById('toast').appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }

  </script>
